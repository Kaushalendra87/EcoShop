{% extends 'myapp/base.html' %}

{% block body %}
<main class="min-h-screen bg-zinc-50 text-zinc-950">
    <section class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        <div class="w-full max-w-md rounded-lg border border-zinc-200 bg-white p-8 text-center shadow-sm">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100 text-emerald-600">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h1 class="mt-4 text-2xl font-bold tracking-tight">Email Verified!</h1>
            <p class="mt-3 text-sm leading-6 text-zinc-600">Your email has been successfully verified. You can now login to your account.</p>
            <a href="{% url 'login' %}" class="mt-6 inline-flex h-11 items-center justify-center rounded-md bg-emerald-600 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700">Login to your account</a>
        </div>
    </section>
</main>
{% endblock %}
