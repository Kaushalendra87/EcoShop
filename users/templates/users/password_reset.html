{% extends 'myapp/base.html' %}

{% block body %}
<main class="min-h-screen bg-zinc-50 text-zinc-950">
    <section class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        <div class="w-full max-w-md rounded-lg border border-zinc-200 bg-white p-6 shadow-sm sm:p-8">
            <h1 class="text-2xl font-bold tracking-tight">Reset your password</h1>
            <p class="mt-2 text-sm leading-6 text-zinc-600">Enter your email and we will send a secure password reset link.</p>
            <form method="POST" class="mt-6 space-y-4">
                {% csrf_token %}
                {% for field in form %}
                    <div>
                        <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-zinc-700">{{ field.label }}</label>
                        <div class="mt-1">{{ field }}</div>
                        {% for error in field.errors %}
                            <p class="mt-1 text-sm text-rose-600">{{ error }}</p>
                        {% endfor %}
                    </div>
                {% endfor %}
                <button type="submit" class="flex h-11 w-full items-center justify-center rounded-md bg-emerald-600 px-4 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700">
                    Send reset link
                </button>
            </form>
            <a href="{% url 'login' %}" class="mt-6 inline-flex text-sm font-semibold text-emerald-700 hover:text-emerald-800">Back to login</a>
        </div>
    </section>
</main>
{% endblock %}
