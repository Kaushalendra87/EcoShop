{% extends 'myapp/base.html' %}

{% block body %}
<main class="min-h-screen bg-zinc-50 text-zinc-950">
    <section class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        <div class="w-full max-w-md rounded-lg border border-zinc-200 bg-white p-8 text-center shadow-sm">
            <h1 class="text-2xl font-bold tracking-tight">Check your email</h1>
            <p class="mt-3 text-sm leading-6 text-zinc-600">If an account exists with that email, a reset link has been sent.</p>
            <a href="{% url 'login' %}" class="mt-6 inline-flex h-11 items-center justify-center rounded-md bg-emerald-600 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700">Return to login</a>
        </div>
    </section>
</main>
{% endblock %}
