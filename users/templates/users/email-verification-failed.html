{% extends 'myapp/base.html' %}

{% block body %}
<main class="min-h-screen bg-zinc-50 text-zinc-950">
    <section class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        <div class="w-full max-w-md rounded-lg border border-zinc-200 bg-white p-8 text-center shadow-sm">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-rose-100 text-rose-600">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <h1 class="mt-4 text-2xl font-bold tracking-tight">Verification Failed</h1>
            <p class="mt-3 text-sm leading-6 text-zinc-600">The verification link is invalid, expired, or has already been used.</p>
            <a href="{% url 'register' %}" class="mt-6 inline-flex h-11 items-center justify-center rounded-md bg-emerald-600 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700">Back to registration</a>
        </div>
    </section>
</main>
{% endblock %}
