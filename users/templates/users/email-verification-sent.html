{% extends 'myapp/base.html' %}

{% block body %}
<main class="min-h-screen bg-zinc-50 text-zinc-950">
    <section class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        <div class="w-full max-w-md rounded-lg border border-zinc-200 bg-white p-8 text-center shadow-sm">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100 text-emerald-600">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 19v-8.93a2 2 0 01.89-1.664l8-5.333a2 2 0 012.22 0l8 5.333A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-2.25-1.5a2 2 0 00-2.22 0l-2.25 1.5M12 14v-4"></path>
                </svg>
            </div>
            <h1 class="mt-4 text-2xl font-bold tracking-tight">Verify your email</h1>
            <p class="mt-3 text-sm leading-6 text-zinc-600">We have sent a verification link to your email address. Please check your inbox and click the link to activate your account.</p>
            <a href="{% url 'login' %}" class="mt-6 inline-flex h-11 items-center justify-center rounded-md bg-emerald-600 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700">Return to login</a>
        </div>
    </section>
</main>
{% endblock %}
